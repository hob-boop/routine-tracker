<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine">
<meta name="theme-color" id="theme-color-meta" content="#4361ee">
<title>Routine Tracker</title>
<style>
:root {
  --bg: #f8f9fa; --bg-2: #ffffff; --bg-3: #f1f3f5;
  --text: #1a1a2e; --text-2: #6c757d;
  --border: #e9ecef; --border-2: #dee2e6;
  --accent: #4361ee; --accent-light: #eef0fd;
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-md: 0 8px 24px rgba(0,0,0,.12);
  --complete: #2d6a4f; --complete-bg: #d8f3dc;
  --progress: #1d6fa6; --progress-bg: #dbeafe;
  --missed: #9d2c2c; --missed-bg: #fee2e2;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}
[data-theme="dark"] {
  --bg: #0f1117; --bg-2: #1a1d27; --bg-3: #13151f;
  --text: #e8eaf6; --text-2: #8892a4;
  --border: #2a2d3e; --border-2: #343747;
  --accent: #5c7cfa; --accent-light: #1a1f3c;
  --complete: #74c69d; --complete-bg: #1b3a2a;
  --progress: #74b9e0; --progress-bg: #162a3e;
  --missed: #e07070; --missed-bg: #3a1616;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; font-size: 14px; }

/* ── APP SHELL ── */
.app { display: flex; height: 100%; overflow: hidden; }
.sidebar { width: 248px; background: var(--bg-2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

/* ── SIDEBAR ── */
.sidebar-header { padding: calc(20px + var(--safe-top)) 16px 14px; border-bottom: 1px solid var(--border); }
.app-logo { display: flex; align-items: center; gap: 10px; }
.app-logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.app-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
.app-sub { font-size: 11px; color: var(--text-2); margin-top: 1px; }
.sidebar-nav { padding: 10px 8px; border-bottom: 1px solid var(--border); }
.nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: none; background: none; color: var(--text-2); font-size: 13px; border-radius: var(--radius); cursor: pointer; text-align: left; transition: all .15s; }
.nav-btn:hover { background: var(--bg-3); color: var(--text); }
.nav-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
.nav-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.sidebar-section { padding: 10px 8px; flex: 1; }
.sidebar-section-title { font-size: 10px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .08em; padding: 4px 12px 8px; }
.cat-group { display: flex; flex-direction: column; }
.category-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius); cursor: pointer; transition: background .15s; }
.category-item:hover { background: var(--bg-3); }
.category-item.filtered { opacity: .4; }
.category-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.category-name { flex: 1; font-size: 13px; }
.category-count { font-size: 11px; color: var(--text-2); background: var(--bg-3); border-radius: 10px; padding: 1px 7px; }
.category-actions { display: none; gap: 2px; }
.category-item:hover .category-actions { display: flex; }
.cat-action-btn { background: none; border: none; cursor: pointer; color: var(--text-2); padding: 3px; border-radius: 4px; }
.cat-action-btn:hover { color: var(--text); background: var(--border); }
.cat-expand-btn { background: none; border: none; cursor: pointer; color: var(--text-2); padding: 3px; border-radius: 4px; transition: transform .2s; flex-shrink: 0; }
.cat-expand-btn:hover { color: var(--text); }
.cat-expand-btn.open { transform: rotate(90deg); }
.add-cat-btn { display: flex; align-items: center; gap: 8px; width: 100%; padding: 8px 12px; border: 1px dashed var(--border-2); border-radius: var(--radius); background: none; color: var(--text-2); font-size: 13px; cursor: pointer; margin-top: 6px; transition: all .15s; }
.add-cat-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.task-list { display: none; padding: 2px 8px 6px 28px; flex-direction: column; gap: 1px; }
.task-list.open { display: flex; }
.task-item { display: flex; align-items: center; gap: 7px; padding: 5px 6px; border-radius: 6px; }
.task-item:hover { background: var(--bg-3); }
.task-cb { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid var(--border-2); appearance: none; cursor: pointer; flex-shrink: 0; position: relative; transition: all .15s; }
.task-cb:checked { background: var(--complete); border-color: var(--complete); }
.task-cb:checked::after { content:''; position:absolute; left:3px; top:0; width:5px; height:9px; border:2px solid #fff; border-top:none; border-left:none; transform:rotate(45deg); }
.task-text { flex: 1; font-size: 12px; color: var(--text); cursor: text; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-text.done { text-decoration: line-through; color: var(--text-2); }
.task-edit-input { flex: 1; font-size: 12px; color: var(--text); background: var(--bg-2); border: 1px solid var(--accent); border-radius: 4px; padding: 1px 5px; outline: none; min-width: 0; }
.task-del-btn { display: none; background: none; border: none; cursor: pointer; color: var(--text-2); padding: 1px 3px; border-radius: 4px; font-size: 14px; line-height: 1; }
.task-del-btn:hover { color: var(--missed); background: var(--missed-bg); }
.task-item:hover .task-del-btn { display: block; }
.add-task-row { display: flex; align-items: center; gap: 6px; padding: 4px 6px; margin-top: 2px; }
.add-task-input { flex: 1; font-size: 12px; background: none; border: none; border-bottom: 1px dashed var(--border-2); color: var(--text); padding: 2px 0; outline: none; min-width: 0; }
.add-task-input::placeholder { color: var(--text-2); }
.add-task-input:focus { border-bottom-color: var(--accent); }
.add-task-submit { background: none; border: none; cursor: pointer; color: var(--text-2); padding: 2px 4px; border-radius: 4px; font-size: 18px; line-height: 1; }
.add-task-submit:hover { color: var(--accent); }
.task-progress { font-size: 10px; color: var(--text-2); padding: 1px 6px; border-radius: 8px; background: var(--bg-3); white-space: nowrap; }
.sidebar-bottom { padding: 10px 8px; border-top: 1px solid var(--border); padding-bottom: calc(10px + var(--safe-bottom)); }
.sidebar-bottom-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px 12px; border: none; background: none; color: var(--text-2); font-size: 13px; border-radius: var(--radius); cursor: pointer; }
.sidebar-bottom-btn:hover { background: var(--bg-3); color: var(--text); }

/* ── TOP BAR ── */
.topbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; padding-top: calc(10px + var(--safe-top)); background: var(--bg-2); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.nav-arrows { display: flex; gap: 4px; }
.arrow-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); padding: 7px 10px; cursor: pointer; color: var(--text-2); transition: all .15s; display: flex; align-items: center; min-height: 36px; }
.arrow-btn:hover { background: var(--bg-3); color: var(--text); }
.today-btn { padding: 7px 14px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; min-height: 36px; }
.today-btn:active { opacity: .85; }
.date-display { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.view-tabs { display: flex; background: var(--bg-3); border-radius: var(--radius); padding: 3px; gap: 2px; flex-shrink: 0; }
.view-tab { padding: 6px 12px; border: none; background: none; border-radius: 7px; font-size: 12px; font-weight: 600; color: var(--text-2); cursor: pointer; transition: all .15s; white-space: nowrap; }
.view-tab.active { background: var(--bg-2); color: var(--accent); box-shadow: var(--shadow); }

/* ── STATUS LEGEND ── */
.status-legend { display: flex; gap: 14px; padding: 7px 16px; background: var(--bg-2); border-bottom: 1px solid var(--border); flex-wrap: wrap; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); }
.status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 3px; vertical-align: middle; flex-shrink: 0; }

/* ── CALENDAR ── */
.calendar-wrapper { flex: 1; overflow-y: auto; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.week-outer, .day-outer { display: flex; flex-direction: column; min-width: 520px; }
.week-header { display: flex; position: sticky; top: 0; background: var(--bg-2); border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
.week-body, .day-body { display: flex; }
.time-gutter { width: 56px; flex-shrink: 0; border-right: 1px solid var(--border); }
.day-header { flex: 1; padding: 10px 4px; text-align: center; border-right: 1px solid var(--border); cursor: pointer; transition: background .15s; }
.day-header:hover { background: var(--bg-3); }
.day-header.today { background: var(--accent-light); }
.day-name { font-size: 10px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .05em; }
.day-num { font-size: 19px; font-weight: 700; margin-top: 2px; color: var(--text); }
.day-header.today .day-num { color: var(--accent); }
.time-col { width: 56px; flex-shrink: 0; }
.time-label { height: 40px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); text-align: right; padding: 4px 7px 0 0; font-size: 10px; color: var(--text-2); background: var(--bg-2); }
.day-col { flex: 1; position: relative; border-right: 1px solid var(--border); min-width: 0; }
.time-cell { height: 40px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.time-cell:hover { background: var(--accent-light); }
.time-cell.half-hour { border-bottom: 1px dashed var(--border); }
.event-block { position: absolute; border-radius: 6px; padding: 3px 6px; overflow: hidden; cursor: pointer; z-index: 2; border-left: 3px solid; transition: filter .15s; }
.event-block:hover { filter: brightness(.92); z-index: 5; }
.event-block:active { filter: brightness(.85); }
.event-title { font-size: 11px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.event-time-label { font-size: 10px; opacity: .75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.time-now-line { position: absolute; left: 0; right: 0; height: 2px; background: #e63946; z-index: 8; pointer-events: none; }
.time-now-dot { position: absolute; left: -4px; top: -4px; width: 10px; height: 10px; border-radius: 50%; background: #e63946; }

/* ── MOBILE WEEK STRIP ── */
.week-strip { display: none; background: var(--bg-2); border-bottom: 1px solid var(--border); padding: 8px 0 10px; flex-shrink: 0; }
.week-strip-row { display: flex; justify-content: space-around; align-items: center; }
.strip-day { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 0; border-radius: 12px; cursor: pointer; flex: 1; transition: all .15s; min-width: 0; }
.strip-day:active { background: var(--bg-3); }
.strip-day-name { font-size: 10px; font-weight: 700; color: var(--text-2); text-transform: uppercase; letter-spacing: .04em; }
.strip-day-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--text); }
.strip-day.today .strip-day-num { background: var(--accent); color: #fff; }
.strip-day.selected:not(.today) .strip-day-num { background: var(--bg-3); }
.strip-day-dots { display: flex; gap: 2px; height: 4px; align-items: center; justify-content: center; min-height: 4px; }
.strip-dot { width: 4px; height: 4px; border-radius: 50%; }

/* ── MOBILE BOTTOM NAV ── */
.bottom-nav { display: none; background: var(--bg-2); border-top: 1px solid var(--border); padding: 8px 0; padding-bottom: calc(8px + var(--safe-bottom)); flex-shrink: 0; }
.bottom-nav-inner { display: flex; justify-content: space-around; }
.bottom-nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 16px; border: none; background: none; color: var(--text-2); font-size: 10px; font-weight: 600; cursor: pointer; border-radius: 10px; flex: 1; transition: color .15s; }
.bottom-nav-btn:active { background: var(--bg-3); }
.bottom-nav-btn.active { color: var(--accent); }
.bottom-nav-btn svg { width: 22px; height: 22px; }
.bottom-nav-badge { display: inline-block; background: var(--accent); color: #fff; font-size: 9px; font-weight: 700; border-radius: 8px; padding: 1px 5px; margin-left: 2px; vertical-align: middle; }

/* ── MOBILE PANELS ── */
.mobile-panel { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; flex-direction: column; }
.mobile-panel.active { display: flex; }
.mobile-panel-header { padding: 16px 16px 8px; font-size: 20px; font-weight: 800; color: var(--text); flex-shrink: 0; }
.mob-cat-section { padding: 0 12px 16px; }
.mob-cat-header { display: flex; align-items: center; gap: 10px; padding: 12px 4px 8px; }
.mob-cat-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.mob-cat-name { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; }
.mob-cat-progress { font-size: 12px; color: var(--text-2); }
.mob-cat-edit { background: none; border: none; cursor: pointer; color: var(--text-2); padding: 6px; border-radius: 8px; }
.mob-cat-edit:active { background: var(--bg-3); }
.mob-task-item { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--border); }
.mob-task-item:last-child { border-bottom: none; }
.mob-task-cb { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border-2); appearance: none; cursor: pointer; flex-shrink: 0; position: relative; transition: all .15s; }
.mob-task-cb:checked { background: var(--complete); border-color: var(--complete); }
.mob-task-cb:checked::after { content:''; position:absolute; left:5px; top:1px; width:7px; height:12px; border:2.5px solid #fff; border-top:none; border-left:none; transform:rotate(45deg); }
.mob-task-text { flex: 1; font-size: 14px; color: var(--text); cursor: pointer; }
.mob-task-text.done { text-decoration: line-through; color: var(--text-2); }
.mob-task-del { background: none; border: none; cursor: pointer; color: var(--text-2); padding: 6px; border-radius: 8px; font-size: 18px; line-height: 1; }
.mob-task-del:active { color: var(--missed); }
.mob-add-task-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px 6px; }
.mob-add-task-input { flex: 1; font-size: 14px; background: var(--bg-3); border: 1px solid transparent; border-radius: 10px; color: var(--text); padding: 9px 12px; outline: none; }
.mob-add-task-input:focus { border-color: var(--accent); background: var(--bg-2); }
.mob-add-task-btn { width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 50%; color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mob-add-cat-btn { display: flex; align-items: center; gap: 10px; margin: 8px 12px 20px; padding: 12px 16px; border: 1.5px dashed var(--border-2); border-radius: var(--radius-lg); background: none; color: var(--text-2); font-size: 14px; font-weight: 600; cursor: pointer; }
.mob-add-cat-btn:active { border-color: var(--accent); color: var(--accent); }
.mob-settings-section { padding: 12px; }
.mob-settings-btn { display: flex; align-items: center; gap: 14px; width: 100%; padding: 14px 16px; background: var(--bg-2); border: none; border-radius: var(--radius-lg); color: var(--text); font-size: 14px; cursor: pointer; text-align: left; }
.mob-settings-btn:active { background: var(--bg-3); }
.mob-settings-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mob-settings-sep { height: 1px; background: var(--border); margin: 4px 12px; }
.mob-settings-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-2); padding: 16px 16px 8px; }

/* ── MODALS ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal { background: var(--bg-2); border-radius: var(--radius-lg); width: 100%; max-width: 460px; box-shadow: var(--shadow-md); overflow: hidden; max-height: calc(100vh - 40px); display: flex; flex-direction: column; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; cursor: pointer; color: var(--text-2); width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: background .15s; }
.modal-close:hover { background: var(--bg-3); }
.modal-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }
.modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-2); }
.form-input { padding: 10px 12px; border: 1.5px solid var(--border-2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-size: 14px; outline: none; width: 100%; transition: border-color .15s; }
.form-input:focus { border-color: var(--accent); }
select.form-input { cursor: pointer; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btn { padding: 10px 18px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:active { opacity: .85; }
.btn-secondary { background: var(--bg-3); color: var(--text); border: 1px solid var(--border-2); }
.btn-secondary:active { background: var(--border); }
.btn-danger { background: var(--missed-bg); color: var(--missed); border: 1px solid var(--missed); }
.btn-danger:active { opacity: .8; }
.status-options { display: flex; gap: 6px; }
.status-pill { flex: 1; text-align: center; padding: 8px 4px; border-radius: var(--radius); font-size: 11px; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: all .15s; }
.status-pill.complete { background: var(--complete-bg); color: var(--complete); }
.status-pill.progress { background: var(--progress-bg); color: var(--progress); }
.status-pill.missed { background: var(--missed-bg); color: var(--missed); }
.status-pill.none { background: var(--bg-3); color: var(--text-2); }
.status-pill.active { border-color: currentColor; }
.color-swatches { display: flex; flex-wrap: wrap; gap: 8px; }
.color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform .1s; }
.color-swatch:hover { transform: scale(1.15); }
.color-swatch.selected { border-color: var(--text); transform: scale(1.1); }
.ev-tasks-panel { display: flex; flex-direction: column; gap: 2px; max-height: 130px; overflow-y: auto; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 6px 8px; background: var(--bg); }
.ev-task-row { display: flex; align-items: center; gap: 8px; padding: 4px 2px; border-radius: 6px; }
.ev-task-row:hover { background: var(--bg-3); }
.ev-task-label { font-size: 13px; color: var(--text); flex: 1; }
.ev-task-label.done { text-decoration: line-through; color: var(--text-2); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

/* ── RESPONSIVE — MOBILE ── */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .topbar { padding: 8px 12px; padding-top: calc(8px + var(--safe-top)); gap: 8px; }
  .date-display { font-size: 13px; }
  .view-tab { padding: 5px 10px; font-size: 11px; }
  .status-legend { display: none; }
  .week-strip { display: block; }
  .bottom-nav { display: block; }
  .calendar-wrapper { overflow-x: hidden; }
  .week-outer, .day-outer { min-width: unset; }
  .time-gutter { width: 48px; }
  .time-col { width: 48px; }
  .time-label { width: 48px; font-size: 9px; padding: 4px 6px 0 0; }
  .day-header { padding: 8px 2px; }
  .day-name { font-size: 9px; }
  .day-num { font-size: 16px; }
  .event-title { font-size: 10px; }
  .event-time-label { display: none; }

  /* Mobile bottom sheet modals */
  .modal-overlay { align-items: flex-end; padding: 0; background: rgba(0,0,0,.5); }
  .modal { border-radius: var(--radius-lg) var(--radius-lg) 0 0; max-width: 100%; max-height: 92vh; padding-bottom: var(--safe-bottom); }
  .modal::before { content: ''; display: block; width: 36px; height: 4px; background: var(--border-2); border-radius: 2px; margin: 10px auto -6px; flex-shrink: 0; }
  .modal-header { padding: 14px 20px; }
  .modal-body { padding: 16px 20px; }

  .form-row { grid-template-columns: 1fr 1fr; }
  .status-options { gap: 5px; }
  .status-pill { font-size: 10px; padding: 7px 2px; }
}

@media (max-width: 480px) {
  .arrow-btn { padding: 7px 8px; }
  .today-btn { padding: 7px 10px; font-size: 12px; }
  .view-tab { padding: 5px 8px; }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ── SIDEBAR (desktop) ── -->

    <!-- Status legend (desktop only) -->

        <div class="legend-item" style="font-size:13px;color:var(--text)"><span class="status-dot" style="background:#9d2c2c;width:10px;height:10px"></span>&nbsp;Missed</div>
        <div class="legend-item" style="font-size:13px;color:var(--text)"><span class="status-dot" style="background:#aaa;width:10px;height:10px"></span>&nbsp;Planned</div>

    <!-- Bottom navigation (mobile) -->
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        <button class="bottom-nav-btn active" id="bnav-calendar" onclick="setMobileTab('calendar')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Calendar
        </button>
        <button class="bottom-nav-btn" id="bnav-tasks" onclick="setMobileTab('tasks')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Tasks
        </button>
        <button class="bottom-nav-btn" id="bnav-settings" onclick="setMobileTab('settings')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>

</div>

<!-- Event Modal -->

    <div class="modal-body">

          <select class="form-input" id="ev-start"></select>

          <div class="status-pill complete" data-status="complete" onclick="selectStatus('complete')">Complete</div>

<div class="modal-overlay" id="cat-modal" style="display:none" onclick="closeCatModal(event)">

<script>
/* ── DATA ── */
const COLORS = [
  '#4361ee','#3a86ff','#8338ec','#ff006e','#fb5607','#f9c74f',
  '#06d6a0','#43aa8b','#277da1','#e63946','#2d6a4f','#6d4c41',
  '#546e7a','#7b2d8b','#0077b6','#ee9b00'
];
const DEFAULT_CATS = [
  {id:'work',name:'Work',color:'#4361ee'},
  {id:'fitness',name:'Fitness',color:'#06d6a0'},
  {id:'personal',name:'Personal',color:'#8338ec'},
  {id:'rest',name:'Rest',color:'#f9c74f'},
  {id:'groceries',name:'Groceries',color:'#fb5607'},
];
let S = {
  view: 'week', currentDate: new Date(),
  events: [], categories: [...DEFAULT_CATS],
  filteredCategories: [], expandedCategories: [], tasks: [],
  theme: 'light', mobileTab: 'calendar', mobileDay: null,
};

/* ── PERSISTENCE ── */
function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem('routine-tracker') || '{}');
    if (d.events) S.events = d.events;
    if (d.categories) S.categories = d.categories;
    if (d.filteredCategories) S.filteredCategories = d.filteredCategories;
    if (d.expandedCategories) S.expandedCategories = d.expandedCategories;
    if (d.tasks) S.tasks = d.tasks;
    if (d.theme) { S.theme = d.theme; applyTheme(d.theme); }
  } catch(e) {}
}
function save() {
  try {
    localStorage.setItem('routine-tracker', JSON.stringify({
      events:S.events, categories:S.categories,
      filteredCategories:S.filteredCategories,
      expandedCategories:S.expandedCategories,
      tasks:S.tasks, theme:S.theme,
    }));
  } catch(e) {}
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('theme-color-meta').content = t==='dark' ? '#1a1d27' : '#4361ee';
}

/* ── TIME HELPERS ── */
function timeSlots() {
  const s = [];
  for (let h=0;h<24;h++) { s.push({h,m:0,label:fmt(h,0)}); s.push({h,m:30,label:fmt(h,30)}); }
  return s;
}
function fmt(h,m) {
  const ap=h<12?'AM':'PM', hh=h%12||12;
  return `${hh}:${m===0?'00':'30'} ${ap}`;
}
function toMins(t) {
  const [time,ap]=t.split(' '); let [h,m]=time.split(':').map(Number);
  if(ap==='PM'&&h!==12)h+=12; if(ap==='AM'&&h===12)h=0;
  return h*60+m;
}
const SLOT_H = 40;

/* ── DATE HELPERS ── */
function weekStart(d) {
  const r=new Date(d); r.setDate(r.getDate()-r.getDay()); r.setHours(0,0,0,0); return r;
}
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function dk(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function dkToDate(s) { const[y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── VIEW SWITCHING ── */
function setView(v) {
  S.view = v;
  ['week','day'].forEach(x => {
    document.getElementById(`nav-${x}`)?.classList.toggle('active', v===x);
    document.getElementById(`tab-${x}`)?.classList.toggle('active', v===x);
  });
  render();
}
function setMobileTab(tab) {
  S.mobileTab = tab;
  ['calendar','tasks','settings'].forEach(t => {
    document.getElementById(`bnav-${t}`)?.classList.toggle('active', t===tab);
  });
  document.getElementById('calendar-wrapper').style.display = tab==='calendar' ? 'flex' : 'none';
  document.getElementById('week-strip').style.display = tab==='calendar' ? 'block' : 'none';
  document.getElementById('topbar-nav')?.classList.toggle('hidden', tab!=='calendar');
  document.getElementById('mobile-tasks-panel').classList.toggle('active', tab==='tasks');
  document.getElementById('mobile-settings-panel').classList.toggle('active', tab==='settings');
  if (tab==='tasks') renderMobileTasks();
  if (tab==='calendar') renderCalendar();
}
function navigate(dir) {
  if (S.view==='week') S.currentDate = addDays(S.currentDate, dir*7);
  else S.currentDate = addDays(S.currentDate, dir);
  if (S.mobileDay) S.mobileDay = dk(S.currentDate);
  render();
}
function goToday() {
  S.currentDate = new Date();
  S.mobileDay = dk(S.currentDate);
  render();
}
function toggleTheme() {
  S.theme = S.theme==='light'?'dark':'light';
  applyTheme(S.theme); save();
}
function toggleCategoryFilter(id) {
  const i=S.filteredCategories.indexOf(id);
  if(i>=0) S.filteredCategories.splice(i,1); else S.filteredCategories.push(id);
  save(); renderCategories(); renderCalendar();
}

/* ── RENDER ── */
function render() {
  renderDateDisplay(); renderCategories();
  if (S.mobileTab==='calendar') renderCalendar();
  renderWeekStrip();
}
function renderDateDisplay() {
  const el = document.getElementById('date-display');
  if (S.view==='week') {
    const ws=weekStart(S.currentDate), we=addDays(ws,6);
    el.textContent = ws.getMonth()===we.getMonth()
      ? `${ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${we.getDate()}, ${we.getFullYear()}`
      : `${ws.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${we.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  } else {
    el.textContent = S.currentDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  }
}

/* ── CATEGORIES SIDEBAR ── */
function renderCategories() {
  const list = document.getElementById('category-list');
  if (!list) return;
  const counts = {};
  S.events.forEach(e => { counts[e.categoryId]=(counts[e.categoryId]||0)+1; });
  list.innerHTML = S.categories.map(cat => {
    const tasks=S.tasks.filter(t=>t.categoryId===cat.id), done=tasks.filter(t=>t.done).length;
    const expanded=S.expandedCategories.includes(cat.id);
    const tasksHtml = tasks.map(t=>`
      <div class="task-item" id="task-item-${t.id}">
        <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleTask('${t.id}')">
        <span class="task-text ${t.done?'done':''}" ondblclick="startEditTask('${t.id}')">${esc(t.text)}</span>
        <button class="task-del-btn" onclick="deleteTask('${t.id}')">&times;</button>
      </div>`).join('');
    return `<div class="cat-group">
      <div class="category-item ${S.filteredCategories.includes(cat.id)?'filtered':''}" onclick="toggleCategoryFilter('${cat.id}')">
        <span class="category-dot" style="background:${cat.color}"></span>
        <span class="category-name">${esc(cat.name)}</span>
        <span class="category-count">${counts[cat.id]||0}</span>
        ${tasks.length?`<span class="task-progress">${done}/${tasks.length}</span>`:''}
        <div class="category-actions" onclick="event.stopPropagation()">
          <button class="cat-action-btn" onclick="openCategoryModal('${cat.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="cat-expand-btn ${expanded?'open':''}" onclick="toggleTaskExpand('${cat.id}')">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
      <div class="task-list ${expanded?'open':''}" id="tasklist-${cat.id}">
        ${tasksHtml}
        <div class="add-task-row">
          <input class="add-task-input" id="new-task-${cat.id}" type="text" placeholder="Add a task..." maxlength="120"
            onkeydown="if(event.key==='Enter'){event.preventDefault();submitAddTask('${cat.id}')}if(event.key==='Escape')this.value=''" />
          <button class="add-task-submit" onclick="submitAddTask('${cat.id}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── MOBILE TASKS PANEL ── */
function renderMobileTasks() {
  const list = document.getElementById('mob-cat-list');
  if (!list) return;
  list.innerHTML = S.categories.map(cat => {
    const tasks=S.tasks.filter(t=>t.categoryId===cat.id), done=tasks.filter(t=>t.done).length;
    return `<div class="mob-cat-section">
      <div class="mob-cat-header">
        <span class="mob-cat-dot" style="background:${cat.color}"></span>
        <span class="mob-cat-name">${esc(cat.name)}</span>
        ${tasks.length?`<span class="mob-cat-progress">${done}/${tasks.length}</span>`:''}
        <button class="mob-cat-edit" onclick="openCategoryModal('${cat.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
      ${tasks.map(t=>`
        <div class="mob-task-item">
          <input type="checkbox" class="mob-task-cb" ${t.done?'checked':''} onchange="toggleTask('${t.id}');renderMobileTasks()">
          <span class="mob-task-text ${t.done?'done':''}" onclick="startMobEditTask('${t.id}')">${esc(t.text)}</span>
          <button class="mob-task-del" onclick="deleteTask('${t.id}');renderMobileTasks()">&times;</button>
        </div>`).join('')}
      <div class="mob-add-task-row">
        <input class="mob-add-task-input" id="mob-new-task-${cat.id}" type="text" placeholder="Add a task..." maxlength="120"
          onkeydown="if(event.key==='Enter'){event.preventDefault();submitMobTask('${cat.id}')}" />
        <button class="mob-add-task-btn" onclick="submitMobTask('${cat.id}')">+</button>
      </div>
    </div>`;
  }).join('');
}
function submitMobTask(catId) {
  const inp = document.getElementById(`mob-new-task-${catId}`);
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  S.tasks.push({id:Date.now().toString(), categoryId:catId, text, done:false});
  save(); renderMobileTasks(); renderCategories();
}
function startMobEditTask(id) {
  const t = S.tasks.find(x=>x.id===id);
  if (!t) return;
  const newText = prompt('Edit task:', t.text);
  if (newText !== null && newText.trim()) { t.text = newText.trim(); save(); renderMobileTasks(); renderCategories(); }
}

/* ── WEEK STRIP ── */
function renderWeekStrip() {
  const strip = document.getElementById('strip-row');
  if (!strip) return;
  const ws = weekStart(S.currentDate);
  const days = Array.from({length:7},(_,i)=>addDays(ws,i));
  const today = new Date();
  if (!S.mobileDay) S.mobileDay = dk(today);
  const isFiltered = id => S.filteredCategories.includes(id);
  strip.innerHTML = days.map(d => {
    const dkey = dk(d);
    const evts = S.events.filter(e=>e.date===dkey && !isFiltered(e.categoryId));
    const dots = evts.slice(0,3).map(e=>`<span class="strip-dot" style="background:${getCatColor(e.categoryId)}"></span>`).join('');
    const isToday = sameDay(d,today);
    const isSel = dkey===S.mobileDay;
    return `<div class="strip-day ${isToday?'today':''} ${isSel?'selected':''}" onclick="selectStripDay('${dkey}')">
      <span class="strip-day-name">${d.toLocaleDateString('en-US',{weekday:'short'})}</span>
      <span class="strip-day-num">${d.getDate()}</span>
      <div class="strip-day-dots">${dots}</div>
    </div>`;
  }).join('');
}
function selectStripDay(dkey) {
  S.mobileDay = dkey;
  S.currentDate = dkToDate(dkey);
  S.view = 'day';
  document.getElementById('tab-week').classList.remove('active');
  document.getElementById('tab-day').classList.add('active');
  document.getElementById('nav-week')?.classList.remove('active');
  document.getElementById('nav-day')?.classList.add('active');
  renderDateDisplay(); renderWeekStrip(); renderCalendar();
}

/* ── CALENDAR RENDERING ── */
function getCatColor(id) {
  const c=S.categories.find(x=>x.id===id); return c?c.color:'#888';
}
function hexRgba(hex,a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function statusColors(s) {
  const m={complete:{dot:'#2d6a4f',bg:'rgba(45,106,79,0.15)'},progress:{dot:'#1d6fa6',bg:'rgba(29,111,166,0.15)'},missed:{dot:'#9d2c2c',bg:'rgba(157,44,44,0.15)'},none:{dot:null,bg:null}};
  return m[s]||m.none;
}
function getEventCols(evs) {
  const sorted=[...evs].sort((a,b)=>toMins(a.startTime)-toMins(b.startTime));
  const cols={}, groups=[];
  sorted.forEach(ev=>{
    const start=toMins(ev.startTime); let placed=false;
    for(const g of groups){
      const slot=g.findIndex(s=>s===null||toMins(evs.find(e=>e.id===s)?.endTime||'12:00 AM')<=start);
      if(slot>=0){g[slot]=ev.id;cols[ev.id]={col:slot,total:0};placed=true;break;}
      if(!placed){g.push(ev.id);cols[ev.id]={col:g.length-1,total:0};placed=true;break;}
    }
    if(!placed){groups.push([ev.id]);cols[ev.id]={col:0,total:0};}
  });
  groups.forEach(g=>g.forEach((id)=>{if(id&&cols[id])cols[id].total=g.length;}));
  return cols;
}
function makeEvEl(ev, wPct, lPct, showNotes) {
  const start=toMins(ev.startTime), end=toMins(ev.endTime);
  const top=(start/30)*SLOT_H, height=Math.max(((end-start)/30)*SLOT_H-2,20);
  const color=getCatColor(ev.categoryId), sc=statusColors(ev.status);
  const bg=sc.bg||hexRgba(color,0.15);
  const el=document.createElement('div');
  el.className='event-block';
  el.style.cssText=`top:${top}px;height:${height}px;left:calc(${lPct}% + 2px);width:calc(${wPct}% - 4px);background:${bg};border-left-color:${color};`;
  el.innerHTML=`${sc.dot?`<span class="status-dot" style="background:${sc.dot}"></span>`:''}<span class="event-title" style="color:${color}">${esc(ev.title)}</span><div class="event-time-label" style="color:${color}">${ev.startTime} – ${ev.endTime}</div>${showNotes&&ev.notes?`<div style="font-size:10px;color:${color};opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(ev.notes)}</div>`:''}`;
  el.addEventListener('click',e=>{e.stopPropagation();openEditEvent(ev.id);});
  return el;
}
function appendEventsToCol(col, evs, showNotes) {
  const colMap=getEventCols(evs);
  evs.forEach(ev=>{
    const info=colMap[ev.id]||{col:0,total:1};
    col.appendChild(makeEvEl(ev,100/info.total,info.col*(100/info.total),showNotes));
  });
}
function addTimeLine(col) {
  const now=new Date();
  const line=document.createElement('div');
  line.className='time-now-line';
  line.style.cssText=`top:${(now.getHours()*60+now.getMinutes())/30*SLOT_H}px;left:0;right:0`;
  line.innerHTML=`<div class="time-now-dot"></div>`;
  col.appendChild(line);
}

function renderCalendar() {
  const wrapper=document.getElementById('calendar-wrapper');
  const slots=timeSlots(), today=new Date();
  const isFiltered=id=>S.filteredCategories.includes(id);
  const cellsHtml=slots.map((s,si)=>`<div class="time-cell${s.m===30?' half-hour':''}" data-si="${si}"></div>`).join('');

  if (S.view==='week') {
    const ws=weekStart(S.currentDate);
    const days=Array.from({length:7},(_,i)=>addDays(ws,i));
    wrapper.innerHTML=`<div class="week-outer">
      <div class="week-header">
        <div class="time-gutter"></div>
        ${days.map(d=>`<div class="day-header${sameDay(d,today)?' today':''}" onclick="selectDay('${dk(d)}')"><div class="day-name">${d.toLocaleDateString('en-US',{weekday:'short'})}</div><div class="day-num">${d.getDate()}</div></div>`).join('')}
      </div>
      <div class="week-body">
        <div class="time-col">${slots.map(s=>`<div class="time-label">${s.m===0?s.label:''}</div>`).join('')}</div>
        ${days.map(d=>`<div class="day-col" id="dcol-${dk(d)}">${cellsHtml}</div>`).join('')}
      </div>
    </div>`;
    days.forEach(d=>{
      const dkey=dk(d), col=document.getElementById(`dcol-${dkey}`);
      col.querySelectorAll('[data-si]').forEach((cell,si)=>{
        const s=slots[si]; cell.addEventListener('click',()=>openNewEvent(dkey,s.h,s.m));
      });
      appendEventsToCol(col,S.events.filter(e=>e.date===dkey&&!isFiltered(e.categoryId)),false);
      if(sameDay(d,today)) addTimeLine(col);
    });
  } else {
    const activeDk = S.mobileDay || dk(S.currentDate);
    wrapper.innerHTML=`<div class="day-outer">
      <div class="day-body">
        <div class="time-col">${slots.map(s=>`<div class="time-label">${s.m===0?s.label:''}</div>`).join('')}</div>
        <div class="day-col" id="dcol-${activeDk}" style="flex:1">${cellsHtml}</div>
      </div>
    </div>`;
    const col=document.getElementById(`dcol-${activeDk}`);
    col.querySelectorAll('[data-si]').forEach((cell,si)=>{
      const s=slots[si]; cell.addEventListener('click',()=>openNewEvent(activeDk,s.h,s.m));
    });
    appendEventsToCol(col,S.events.filter(e=>e.date===activeDk&&!isFiltered(e.categoryId)),true);
    if(sameDay(dkToDate(activeDk),today)) addTimeLine(col);
  }
  wrapper.scrollTop=8*2*SLOT_H;
}
function selectDay(dkey) {
  S.currentDate = dkToDate(dkey);
  S.mobileDay = dkey;
  setView('day');
}

/* ── EVENT MODAL ── */
let editingId=null, editingDate=null, selStatus='none';

function buildTimeSelects() {
  const slots=timeSlots();
  const opts=slots.map(s=>`<option value="${s.label}">${s.label}</option>`).join('');
  document.getElementById('ev-start').innerHTML=opts;
  document.getElementById('ev-end').innerHTML=opts;
}
function buildCatSelect(selId) {
  document.getElementById('ev-category').innerHTML=S.categories.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  if(selId) document.getElementById('ev-category').value=selId;
}
function renderEventTasks(catId) {
  const group=document.getElementById('ev-tasks-group'), list=document.getElementById('ev-tasks-list');
  const tasks=S.tasks.filter(t=>t.categoryId===catId);
  if(!tasks.length){group.style.display='none';return;}
  const cat=S.categories.find(c=>c.id===catId);
  document.getElementById('ev-tasks-catname').textContent=cat?`— ${cat.name}`:'';
  group.style.display='';
  list.innerHTML=tasks.map(t=>`
    <div class="ev-task-row">
      <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleTask('${t.id}');renderEventTasks('${catId}')">
      <span class="ev-task-label ${t.done?'done':''}">${esc(t.text)}</span>
    </div>`).join('');
}
function openNewEvent(dateStr,h,m) {
  editingId=null; editingDate=dateStr;
  buildTimeSelects(); const fid=S.categories[0]?.id||'';
  buildCatSelect(fid);
  document.getElementById('event-modal-title').textContent='Add Event';
  document.getElementById('ev-title').value='';
  document.getElementById('ev-notes').value='';
  document.getElementById('ev-start').value=fmt(h,m);
  document.getElementById('ev-end').value=fmt(Math.min(m===30?h+1:h,23),m===30?0:30);
  document.getElementById('ev-delete-btn').style.display='none';
  selectStatus('none'); renderEventTasks(fid);
  document.getElementById('event-modal').style.display='flex';
  setTimeout(()=>document.getElementById('ev-title').focus(),100);
}
function openEditEvent(id) {
  const ev=S.events.find(e=>e.id===id); if(!ev) return;
  editingId=id; editingDate=ev.date;
  buildTimeSelects(); buildCatSelect(ev.categoryId);
  document.getElementById('event-modal-title').textContent='Edit Event';
  document.getElementById('ev-title').value=ev.title;
  document.getElementById('ev-notes').value=ev.notes||'';
  document.getElementById('ev-start').value=ev.startTime;
  document.getElementById('ev-end').value=ev.endTime;
  document.getElementById('ev-delete-btn').style.display='';
  selectStatus(ev.status||'none'); renderEventTasks(ev.categoryId);
  document.getElementById('event-modal').style.display='flex';
}
function closeEventModal(e) {
  if(e&&e.target!==document.getElementById('event-modal')) return;
  document.getElementById('event-modal').style.display='none';
}
function selectStatus(s) {
  selStatus=s;
  document.querySelectorAll('.status-pill').forEach(p=>p.classList.toggle('active',p.dataset.status===s));
}
function saveEvent() {
  const title=document.getElementById('ev-title').value.trim();
  if(!title){document.getElementById('ev-title').focus();return;}
  const st=document.getElementById('ev-start').value, et=document.getElementById('ev-end').value;
  const catId=document.getElementById('ev-category').value, notes=document.getElementById('ev-notes').value.trim();
  if(editingId){
    const ev=S.events.find(e=>e.id===editingId);
    if(ev){ev.title=title;ev.startTime=st;ev.endTime=et;ev.categoryId=catId;ev.status=selStatus;ev.notes=notes;}
  } else {
    S.events.push({id:Date.now().toString(),date:editingDate,title,startTime:st,endTime:et,categoryId:catId,status:selStatus,notes});
  }
  save(); document.getElementById('event-modal').style.display='none'; render();
}
function deleteEvent() {
  if(!editingId) return;
  S.events=S.events.filter(e=>e.id!==editingId);
  save(); document.getElementById('event-modal').style.display='none'; render();
}

/* ── CATEGORY MODAL ── */
let editCatId=null, selColor=COLORS[0];
function openCategoryModal(id) {
  editCatId=id||null;
  const cat=id?S.categories.find(c=>c.id===id):null;
  document.getElementById('cat-modal-title').textContent=cat?'Edit Category':'Add Category';
  document.getElementById('cat-name').value=cat?cat.name:'';
  selColor=cat?cat.color:COLORS[0];
  document.getElementById('cat-delete-btn').style.display=cat?'':'none';
  renderSwatches();
  document.getElementById('cat-modal').style.display='flex';
  setTimeout(()=>document.getElementById('cat-name').focus(),100);
}
function closeCatModal(e) {
  if(e&&e.target!==document.getElementById('cat-modal')) return;
  document.getElementById('cat-modal').style.display='none';
}
function renderSwatches() {
  document.getElementById('color-swatches').innerHTML=COLORS.map(c=>`<div class="color-swatch ${c===selColor?'selected':''}" style="background:${c}" onclick="selColor='${c}';renderSwatches()"></div>`).join('');
}
function saveCategory() {
  const name=document.getElementById('cat-name').value.trim();
  if(!name){document.getElementById('cat-name').focus();return;}
  if(editCatId){const c=S.categories.find(x=>x.id===editCatId);if(c){c.name=name;c.color=selColor;}}
  else{S.categories.push({id:Date.now().toString(),name,color:selColor});}
  save(); document.getElementById('cat-modal').style.display='none'; render();
  if(S.mobileTab==='tasks') renderMobileTasks();
}
function deleteCategory() {
  if(!editCatId) return;
  S.categories=S.categories.filter(c=>c.id!==editCatId);
  S.events=S.events.filter(e=>e.categoryId!==editCatId);
  S.tasks=S.tasks.filter(t=>t.categoryId!==editCatId);
  S.filteredCategories=S.filteredCategories.filter(id=>id!==editCatId);
  S.expandedCategories=S.expandedCategories.filter(id=>id!==editCatId);
  save(); document.getElementById('cat-modal').style.display='none'; render();
  if(S.mobileTab==='tasks') renderMobileTasks();
}

/* ── TASKS ── */
function toggleTaskExpand(catId) {
  const i=S.expandedCategories.indexOf(catId);
  if(i>=0) S.expandedCategories.splice(i,1); else S.expandedCategories.push(catId);
  save(); renderCategories();
}
function toggleTask(id) {
  const t=S.tasks.find(x=>x.id===id); if(t){t.done=!t.done;save();renderCategories();}
}
function deleteTask(id) {
  S.tasks=S.tasks.filter(t=>t.id!==id); save(); renderCategories();
}
function submitAddTask(catId) {
  const inp=document.getElementById(`new-task-${catId}`); if(!inp) return;
  const text=inp.value.trim(); if(!text) return;
  S.tasks.push({id:Date.now().toString(),categoryId:catId,text,done:false});
  if(!S.expandedCategories.includes(catId)) S.expandedCategories.push(catId);
  save(); renderCategories();
  const ni=document.getElementById(`new-task-${catId}`); if(ni) ni.focus();
}
function startEditTask(id) {
  const t=S.tasks.find(x=>x.id===id); if(!t) return;
  const item=document.getElementById(`task-item-${id}`); if(!item) return;
  const textEl=item.querySelector('.task-text');
  const inp=document.createElement('input');
  inp.className='task-edit-input'; inp.value=t.text; inp.maxLength=120;
  textEl.replaceWith(inp); inp.focus(); inp.select();
  const commit=()=>{const v=inp.value.trim();if(v)t.text=v;save();renderCategories();};
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur();}
    if(e.key==='Escape'){inp.removeEventListener('blur',commit);renderCategories();}
  });
}

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', e => {
  const anyModal=document.getElementById('event-modal').style.display==='flex'||document.getElementById('cat-modal').style.display==='flex';
  if(anyModal){
    if(e.key==='Escape'){document.getElementById('event-modal').style.display='none';document.getElementById('cat-modal').style.display='none';}
    if(e.key==='Enter'&&e.target.tagName!=='TEXTAREA'&&e.target.tagName!=='SELECT'){e.preventDefault();if(document.getElementById('event-modal').style.display==='flex')saveEvent();else saveCategory();}
    return;
  }
  const tag=e.target.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='ArrowRight') navigate(1);
  if(e.key==='t'||e.key==='T') goToday();
  if(e.key==='w'||e.key==='W') setView('week');
  if(e.key==='d'||e.key==='D') setView('day');
});

/* ── TOUCH SWIPE on calendar ── */
let touchStartX=0;
document.getElementById('calendar-wrapper').addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.getElementById('calendar-wrapper').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>60) navigate(dx<0?1:-1);
},{passive:true});

  const iconUrl='data:image/svg+xml,'+encodeURIComponent(icon);

  try {

S.mobileDay = dk(S.currentDate);
render();
